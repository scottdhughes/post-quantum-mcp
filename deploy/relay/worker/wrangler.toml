name = "quantum-seal-relay"
main = "src/index.ts"
compatibility_date = "2026-04-01"

[vars]
MAX_ENVELOPE_SIZE = "51200"       # 50KB
MAX_MESSAGES_PER_MAILBOX = "1000"
MESSAGE_TTL_SECONDS = "86400"     # 24 hours
RATE_LIMIT_POST_PER_MIN = "60"
RATE_LIMIT_GET_PER_MIN = "120"
TRUSTED_IPS = ""              # comma-separated IPs that bypass rate limiting
# For production: override with `wrangler secret put RELAY_ADMIN_TOKEN`
# This default is for local dev/tests only — NOT a production credential.
RELAY_ADMIN_TOKEN = "test-admin-token-do-not-use-in-production"

[[kv_namespaces]]
binding = "MAILBOX"
id = "705ade496106445a8b604f0a0c340ac8"
