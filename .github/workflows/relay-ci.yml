name: Relay Worker CI

on:
  push:
    branches: [main]
    paths: ['deploy/relay/worker/**']
  pull_request:
    paths: ['deploy/relay/worker/**']

defaults:
  run:
    working-directory: deploy/relay/worker

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run typecheck
      - run: npm run build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm test
